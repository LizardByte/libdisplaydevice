---
name: CI
permissions: {}

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  setup_release:
    name: Setup Release
    outputs:
      publish_release: ${{ steps.setup_release.outputs.publish_release }}
      release_body: ${{ steps.setup_release.outputs.release_body }}
      release_commit: ${{ steps.setup_release.outputs.release_commit }}
      release_generate_release_notes: ${{ steps.setup_release.outputs.release_generate_release_notes }}
      release_tag: ${{ steps.setup_release.outputs.release_tag }}
      release_version: ${{ steps.setup_release.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Release
        id: setup_release
        uses: LizardByte/actions/actions/release_setup@70bb8d394d1c92f6113aeec6ae9cc959a5763d15  # v2026.227.200013
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: setup_release
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive

      - name: Setup Dependencies Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            nlohmann-json3-dev

      - name: Setup Dependencies macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            boost \
            cmake \
            doxygen \
            graphviz \
            nlohmann-json \
            ninja \
            node \

      - name: Setup Dependencies Windows
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda  # v2.30.0
        with:
          msystem: ucrt64
          update: true
          install: >-
            doxygen
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-graphviz
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nodejs
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Prepare tests
        id: prepare-tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # function to download and extract a zip file
          function DownloadAndExtract {
            param (
              [string]$Uri,
              [string]$OutFile
            )

            $maxRetries = 5
            $retryCount = 0
            $success = $false

            while (-not $success -and $retryCount -lt $maxRetries) {
              $retryCount++
              Write-Host "Downloading $Uri to $OutFile, attempt $retryCount of $maxRetries"
              try {
                Invoke-WebRequest -Uri $Uri -OutFile $OutFile
                $success = $true
              } catch {
                Write-Host "Attempt $retryCount of $maxRetries failed with error: $($_.Exception.Message). Retrying..."
                Start-Sleep -Seconds 5
              }
            }

            if (-not $success) {
              Write-Host "Failed to download the file after $maxRetries attempts."
              exit 1
            }

            # use .NET to get the base name of the file
            $baseName = (Get-Item $OutFile).BaseName

            # Extract the zip file
            Expand-Archive -Path $OutFile -DestinationPath $baseName
          }

          # NefCon - utility used for installing the virtual display driver
          DownloadAndExtract `
            -Uri "https://github.com/nefarius/nefcon/releases/download/v1.17.40/nefcon_v1.17.40.zip" `
            -OutFile "nefcon_v1.17.40.zip"
          $nefConExe = (Resolve-Path "nefcon_v1.17.40\x64\nefconw.exe").Path

          # Virtual Display Driver (VDD)
          # VDD creates proper IDD-based virtual displays, unlike usbmmidd_v2 which
          # reported DISPLAYCONFIG_OUTPUT_TECHNOLOGY_OTHER and failed clone topology operations
          # on modern Windows runners. VDD is officially signed and supports all topology modes.
          DownloadAndExtract `
            -Uri "https://github.com/VirtualDrivers/Virtual-Display-Driver/releases/download/25.7.23/VirtualDisplayDriver-x86.Driver.Only.zip" `
            -OutFile "VirtualDisplayDriver-x86.Driver.Only.zip"

          # install VDD signing certificate so Windows trusts the driver
          $catFile = (Resolve-Path "VirtualDisplayDriver-x86.Driver.Only\VirtualDisplayDriver\mttvdd.cat").Path
          $catBytes = [System.IO.File]::ReadAllBytes($catFile)
          $certificates = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2Collection
          $certificates.Import($catBytes)
          foreach ($cert in $certificates) {
            $certFilePath = Join-Path $env:TEMP "$($cert.Thumbprint).cer"
            $certBytes = $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
            [System.IO.File]::WriteAllBytes($certFilePath, $certBytes)
            Import-Certificate -FilePath $certFilePath -CertStoreLocation "Cert:\LocalMachine\TrustedPublisher"
          }

          # pre-create the VDD settings directory and XML configuration file
          # the driver reads this file on startup to determine how many virtual monitors to create
          New-Item -ItemType Directory -Path "C:\VirtualDisplayDriver" -Force | Out-Null
          $vddXml = @"
          <?xml version='1.0' encoding='utf-8'?>
          <vdd_settings>
            <monitors>
              <count>2</count>
            </monitors>
          </vdd_settings>
          "@
          [System.IO.File]::WriteAllText("C:\VirtualDisplayDriver\vdd_settings.xml", $vddXml, [System.Text.Encoding]::UTF8)

          # install the virtual display driver and wait for displays to appear
          Push-Location "VirtualDisplayDriver-x86.Driver.Only"
          & $nefConExe install .\VirtualDisplayDriver\MttVDD.inf "Root\MttVDD"
          Pop-Location

          # wait for the VDD device to be ready (up to 60 seconds)
          $vddReady = $false
          for ($elapsed = 0; $elapsed -lt 60; $elapsed += 5) {
            $device = Get-PnpDevice -HardwareID "Root\MttVDD" -ErrorAction SilentlyContinue
            if ($device -and $device.Status -eq "OK") {
              Write-Host "VDD device ready after ${elapsed}s"
              $vddReady = $true
              break
            }
            Start-Sleep -Seconds 5
          }
          if (-not $vddReady) {
            Write-Warning "VDD device did not reach OK status within 60s"
          }

      - name: Setup python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'

      - name: Python Path
        id: python-path
        env:
          TMP_PYTHON_PATH: ${{ steps.setup-python.outputs.python-path }}
        run: |
          if [ "${RUNNER_OS}" == "Windows" ]; then
            # replace backslashes with double backslashes
            python_path=$(echo "${TMP_PYTHON_PATH}" | sed 's/\\/\\\\/g')
          else
            python_path="${TMP_PYTHON_PATH}"
          fi

          # step output
          echo "python-path=${python_path}"
          echo "python-path=${python_path}" >> "${GITHUB_OUTPUT}"

      - name: Build
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          BUILD_VERSION: ${{ needs.setup_release.outputs.release_tag }}
          COMMIT: ${{ needs.setup_release.outputs.release_commit }}
        run: |
          mkdir -p build

          if [ "${RUNNER_OS}" = "Linux" ]; then
            # Doxygen from Ubuntu is too old, need Doxygen >= 1.10
            DOCS=OFF
          else
            DOCS=ON
          fi

          cmake \
            -DBUILD_DOCS=${DOCS} \
            -DCMAKE_BUILD_TYPE:STRING=Debug \
            -B build \
            -G Ninja \
            -S .
          ninja -C build

      - name: Run tests
        id: test
        working-directory: build/tests
        run: ./test_libdisplaydevice --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Generate gcov report
        id: test_report
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure')
        env:
          PYTHON_PATH: ${{ steps.python-path.outputs.python-path }}
        working-directory: build
        run: |
          "${PYTHON_PATH}" -m pip install "../scripts[test]"
          "${PYTHON_PATH}" -m gcovr . -r ../src \
            --exclude-noncode-lines \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --verbose \
            --xml-pretty \
            -o coverage.xml

      - name: Upload coverage artifact
        if: >-
          always() &&
          (steps.test_report.outcome == 'success')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-${{ matrix.os }}
          path: |
            build/coverage.xml
            build/tests/test_results.xml
          if-no-files-found: error

      - name: Move Artifacts
        run: |
          mkdir -p artifacts
          if ["${RUNNER_OS}" == "Windows"]; then
            mv -f ./build/tests/test_libdisplaydevice.exe artifacts/
          else
            mv -f ./build/tests/test_libdisplaydevice artifacts/
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: build-${{ runner.os }}
          path: artifacts/
          if-no-files-found: error

  coverage:
    name: Coverage-${{ matrix.flag }}
    if: >-
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'failure') &&
      startsWith(github.repository, 'LizardByte/')
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_os: ubuntu-latest
            flag: Linux
          - build_os: macos-latest
            flag: macOS
          - build_os: windows-latest
            flag: Windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-${{ matrix.build_os }}
          path: _coverage

      - name: Debug coverage file
        run: cat _coverage/coverage.xml

      - name: Upload test coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./_coverage/coverage.xml
          report_type: coverage
          flags: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload test results
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./_coverage/tests/test_results.xml
          report_type: test_results
          flags: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  release:
    name: Release
    if:
      always() &&
      needs.setup_release.outputs.publish_release == 'true' &&
      needs.build.result == 'success' &&
      startsWith(github.repository, 'LizardByte/')
    needs:
      - build
      - setup_release
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact (Windows)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-Windows
          path: build-Windows

      - name: Download build artifact (Linux)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-Linux
          path: build-Linux

      - name: Download build artifact (macOS)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-macOS
          path: build-macOS

      - name: Move artifacts
        run: |
          mkdir -p artifacts
          mv -f build-Windows/test_libdisplaydevice.exe artifacts/test_libdisplaydevice-Windows.exe
          mv -f build-Linux/test_libdisplaydevice artifacts/test_libdisplaydevice-Linux
          mv -f build-macOS/test_libdisplaydevice artifacts/test_libdisplaydevice-macOS

      - name: Create/Update GitHub Release
        if: needs.setup_release.outputs.publish_release == 'true'
        uses: LizardByte/actions/actions/release_create@70bb8d394d1c92f6113aeec6ae9cc959a5763d15  # v2026.227.200013
        with:
          allowUpdates: false
          body: ${{ needs.setup_release.outputs.release_body }}
          draft: true
          generateReleaseNotes: ${{ needs.setup_release.outputs.release_generate_release_notes }}
          name: ${{ needs.setup_release.outputs.release_tag }}
          prerelease: true
          tag: ${{ needs.setup_release.outputs.release_tag }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          virustotal_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
